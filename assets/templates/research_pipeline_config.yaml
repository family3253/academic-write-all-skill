project:
  name: "my-writing-project"
  mode: "artifact-driven"

research:
  topic: "Your topic here"
  review_type: "narrative"
  domains:
    - "your-domain"
  target_output: "paper_section"
  quality_threshold: 4.0

runtime:
  timezone: "Asia/Shanghai"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

retrieval:
  preferred_provider_order:
    - "wanfang-official-api"
    - "cnki-authorized-browser"
    - "ipubmed-authorized-browser"
    - "manual-export-import"
  browser_profile_dir: ""
  download_dir: "downloads"
  adapter_configs:
    wanfang: "assets/templates/wanfang_topic_api_config.json"
    cnki: "assets/templates/cnki_browser_workflow.json"
    ipubmed: "assets/templates/ipubmed_browser_workflow.json"

notifications:
  channel: "console"
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

agent_bridge:
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: true

llm:
  provider: "openai-compatible"
  primary_model: "gpt-4o"
  fallback_models:
    - "gpt-4o-mini"

security:
  hitl_required_stages: [2, 3, 4, 6]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

stages:
  - id: 1
    name: "retrieval"
    owner: "cycwrite-retrieval-orchestrator"
    outputs:
      - "candidate_pool.csv"
      - "session_manifest.md"
  - id: 2
    name: "screening"
    owner: "cycwrite-screening-analyst"
    outputs:
      - "title_abstract_screening.csv"
      - "fulltext_screening.csv"
      - "gate_report.md"
    gate: true
  - id: 3
    name: "evidence_extraction"
    owner: "cycwrite-evidence-extractor"
    outputs:
      - "evidence_extraction.csv"
      - "claim_mapping.md"
    gate: true
  - id: 4
    name: "decision_loop"
    owner: "cycwrite-decision-synthesizer"
    outputs:
      - "decision_packet.md"
      - "decision_record.md"
    gate: true
  - id: 5
    name: "writing"
    owner: "cycwrite-writing-coordinator"
    outputs:
      - "outline.md"
      - "draft_sections.md"
  - id: 6
    name: "final_gate"
    owner: "cycwrite-sentinel-watchdog"
    outputs:
      - "deliverables_manifest.md"
      - "sentinel_watch_report.md"
      - "citation_authenticity_report.md"
    gate: true
